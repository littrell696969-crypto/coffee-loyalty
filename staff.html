


<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Staff Panel</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    #reader {
      margin: auto;
      width: 350px;
    }

    input {
      margin-top: 15px;
      padding: 8px;
      font-size: 16px;
    }

    button {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 15px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Staff Scanner</h1>

<button onclick="startScanner()">Start Scanner</button>
<button onclick="logout()">Logout</button>

<div id="reader"></div>

<br>

<input id="manualId" placeholder="Enter customer ID">
<button onclick="manualAdd()">Add Coffee</button>

<p id="result"></p>

<script src="staff.js"></script>

</body>
</html>
